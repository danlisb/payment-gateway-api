version: '3.8'

services:
  app:
    build: .
    ports:
      - '3333:3333'
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure
    command: >
      sh -c "node ace migration:run --force &&
             node ace db:seed --files database/seeders/gateway_seeder.ts &&
             node ace db:seed --files database/seeders/user_seeder.ts &&
             node bin/server.js"

  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

  gateways:
    image: matheusprotzen/gateways-mock
    ports:
      - '3001:3001'
      - '3002:3002'

volumes:
  mysql_data: